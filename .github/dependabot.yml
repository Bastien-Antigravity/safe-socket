# [FLEET-ARCHITECT] Standardized Polyglot Dependabot
# Sync-ID: 2026-05-11-GLOBAL-001
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/{{PYTHON_DIR}}"
    schedule:
      interval: "weekly"

  - package-ecosystem: "cargo"
    directory: "/{{RUST_DIR}}"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
