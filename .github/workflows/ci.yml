# [FLEET-ARCHITECT] Polyglot: Go+Python (Go:1.25, Py:3.12, Rust:1.91, C++:20)
name: Polyglot CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  GOTOOLCHAIN: auto

jobs:
  go-ci:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go Tests
        run: |
          go mod tidy
          go test -v ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: .
          args: --exclude="QF1008"
  python-ci:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download Core Library (If Native Provider)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: libdistconf
          path: distributed-config/distconf/libdistconf/

      - name: Checkout Distributed Config (If External Consumer)
        if: github.repository != 'Bastien-Antigravity/distributed-config'
        uses: actions/checkout@v4
        with:
          repository: Bastien-Antigravity/distributed-config
          path: distributed-config
          ref: develop

      - name: Build Distributed Config Library (If External Consumer)
        if: github.repository != 'Bastien-Antigravity/distributed-config'
        working-directory: distributed-config
        run: make build-lib

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build CGO Bridges
        run: |
          if grep -q "^core:" Makefile; then make core; elif grep -q "^build:" Makefile; then make build; fi

      - name: Test Python SDK
        working-directory: python
        env:
          LIBDISTCONF_PATH: ${{ github.repository == 'Bastien-Antigravity/distributed-config' && format('{0}/distconf/libdistconf/libdistconf.so', github.workspace) || format('{0}/distributed-config/distconf/libdistconf/libdistconf.so', github.workspace) }}
        run: |
          pip install pytest build setuptools wheel
          if [ -f setup.py ]; then python setup.py build_go; fi
          pip install -e .
          pytest
