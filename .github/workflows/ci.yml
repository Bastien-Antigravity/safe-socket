# [FLEET-ARCHITECT] Polyglot: Go+Python (Go:1.25, Py:3.12, Rust:1.91, C++:20)
# Sync-ID: 2026-05-11-GLOBAL-001
name: Polyglot CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  GOTOOLCHAIN: auto

jobs:
  go-ci:
    uses: Bastien-Antigravity/fleet-operation-brain/.github/workflows/workflow-go.yml@develop
    with:
      working_directory: '.'
      go_version: '1.25'
    secrets: inherit
  python-ci:
    uses: Bastien-Antigravity/fleet-operation-brain/.github/workflows/workflow-python.yml@develop
    with:
      working_directory: 'python'
      python_version: '3.12'
      go_version: '1.25'
    secrets: inherit
