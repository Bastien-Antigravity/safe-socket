name: CI Verification

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  verify:
    name: Full Fleet Verification (Go + Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Install Cap'n Proto
        run: |
          sudo apt-get update
          sudo apt-get install -y capnproto
          go install capnproto.org/go/capnp/v3/capnpc-go@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Build Core & C-API
        run: make build

      - name: Go Lint & Test
        run: |
          go fmt ./...
          go test -v -race ./...

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Python Verification
        run: |
          cd python
          pip install pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install .
          pytest

      # Sandbox Integration (Global Fleet Callback)
      - name: Trigger Sandbox Verification
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          echo "📡 Dispatching fleet-event to sandbox-testing..."
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.FLEET_ACCESS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Bastien-Antigravity/sandbox-testing/dispatches \
            -d '{"event_type": "fleet-event", "client_payload": {"repo": "${{ github.repository }}", "branch": "${{ github.ref_name }}"}}'
