name: Polyglot CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [main]

env:
  GOTOOLCHAIN: auto

jobs:
  go-ci:
    name: Go Tests
    runs-on: ubuntu-latest
    # Only run if go.mod exists in root
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Check for go.mod
        id: check_go
        run: |
          if [ -f go.mod ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Go
        if: steps.check_go.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go Tests
        if: steps.check_go.outputs.exists == 'true'
        run: |
          go mod tidy
          go test -v ./...

      - name: Run golangci-lint
        if: steps.check_go.outputs.exists == 'true'
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
  python-ci:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build CGO Bridges
        run: |
          if grep -q "^core:" Makefile; then make core; elif grep -q "^build:" Makefile; then make build; fi

      - name: Test Python SDK
        working-directory: python
        run: |
          pip install pytest build setuptools wheel
          if [ -f setup.py ]; then python setup.py build_go; fi
          pip install -e .
          pytest
