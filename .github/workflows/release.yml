name: Polyglot Release

on:
  push:
    tags: ['v*']

jobs:
  build_artifacts:
    name: Build Artifacts on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Shared Libraries
        run: |
          if grep -q "^build-all:" Makefile; then make build-all; elif grep -q "^build:" Makefile; then make build; fi

      - name: Package Python SDK
        run: |
          # Find all directories containing requirements.txt (excluding hidden ones)
          PYTHON_DIRS=$(find . -maxdepth 3 -name "requirements.txt" -not -path "*/.*" -exec dirname {} \;)
          for dir in $PYTHON_DIRS; do
            if [ -f "$dir/setup.py" ] || [ -f "$dir/pyproject.toml" ]; then
              echo "--- Packaging Python SDK in $dir ---"
              cd "$dir"
              python -m pip install --upgrade pip build setuptools wheel
              python -m build
              cd - > /dev/null
            fi
          done
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            **/dist/*.whl
            **/dist/*.tar.gz
            **/lib*/*.so
            **/lib*/*.dll
            **/lib*/*.dylib

  release:
    name: Create GitHub Release
    needs: build_artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
          # Use merge-multiple to get all OS builds into one folder
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
